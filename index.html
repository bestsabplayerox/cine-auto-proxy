<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@2.0.0/dist/uv.bundle.js"></script>
    <script src="/uv.config.js"></script>
</head>
<body style="background: black; color: white; text-align: center; margin-top: 20vh; font-family: sans-serif;">
    
    <h2>Connecting to Server...</h2>

    <script>
        // The exact site you want to load
        const targetUrl = "https://cine-hub-blocked.netlify.app/";
        
        // Boot up the proxy engine and redirect instantly
        navigator.serviceWorker.register('/sw.js', { scope: __uv$config.prefix })
            .then(() => {
                let encoded = __uv$config.encodeUrl(targetUrl);
                window.location.href = __uv$config.prefix + encoded;
            }).catch(err => {
                document.body.innerHTML = "<h2>Error. Try refreshing.</h2>";
            });
    </script>
</body>
</html>
